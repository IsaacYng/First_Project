<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Go! YNG | Bajaj Phidim</title>
   <link rel="stylesheet" href="style.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

   <nav>
      <div class="nav_head">
         <div class="logo">
            <span class="brand_go">Go!</span><span class="brand_yng">YNG</span>
         </div>
         
         <div class="nav_a desktop_menu">
            <a href="#home">Home</a>
            <a href="#Price_list">Price</a>
            <a href="finance.html">Finance</a>
            <a href="#Contact">Contact</a>
         </div>

         <div class="mobile_toggle" onclick="toggleDrawer()">
            <i class="fa-solid fa-bars-staggered"></i>
         </div>

         <div class="nav_img">
            <img src="favicon.png" alt="Profile">
         </div>
      </div>
   </nav>

   <div id="appDrawer" class="drawer">
      <div class="drawer_header">
         <span>Menu</span>
         <i class="fa-solid fa-xmark" onclick="toggleDrawer()"></i>
      </div>
      <div class="drawer_links">
         <a href="#home" onclick="toggleDrawer()">Home</a>
         <a href="#Price_list" onclick="toggleDrawer()">Price List</a>
         <a href="finance.html">Finance</a>
         <a href="#Contact" onclick="toggleDrawer()">Contact</a>
      </div>
   </div>
   <div id="drawerOverlay" class="overlay" onclick="toggleDrawer()"></div>

   <section class="hero_section" id="home">
      <div class="hero_content">
         <h1 class="hero_title">Let's <span class="highlight">Race</span></h1>
         <p class="hero_subtitle">The All-New Dominance.</p>
         <div class="hero_buttons">
            <button class="btn_primary">Get Started</button>
            <button class="btn_secondary" onclick="document.getElementById('Price_list').scrollIntoView()">Explore Models</button>
         </div>
      </div>
   </section>

   <section id="Price_list" class="price_container">
      <h2 class="section_title">Price List</h2>
      
      <div class="search-box-wrapper">
         <i class="fa-solid fa-magnifying-glass"></i>
         <input type="text" id="search-input" onkeyup="searchBikes()" placeholder="Search your favorite bike...">
      </div>

      <div id="bike-container" class="bike-grid">
         </div>
   </section>

   <footer class="main-footer" id="Contact">
      <div class="footer-container">
         <div class="footer-box">
            <h3>Go! YNG</h3>
            <p>Your trusted Bajaj partner in Phidim.</p>
            <div class="social-links">
               <a href="#" class="fb"><i class="fa-brands fa-facebook-f"></i></a>
               <a href="#" class="ig"><i class="fa-brands fa-instagram"></i></a>
            </div>
         </div>
         <div class="footer-box">
            <h4>Contact Info</h4>
            <p>📍 Phidim, Nepal</p>
            <p>📞 +977-9802315425</p>
         </div>
      </div>
      <div class="footer-bottom">
         <p>&copy; 2026 Go! YNG | Designed for Bajaj Enthusiasts</p>
      </div>
   </footer>

   <script>
      function toggleDrawer() {
         document.getElementById('appDrawer').classList.toggle('active');
         document.getElementById('drawerOverlay').classList.toggle('active');
      }

      // Simple Search Logic (Ensure this matches your card's class names)
      function searchBikes() {
         let input = document.getElementById('search-input').value.toLowerCase();
         let cards = document.getElementsByClassName('bike-card');
         
         for (let i = 0; i < cards.length; i++) {
            let title = cards[i].querySelector('h3').innerText.toLowerCase();
            if (title.includes(input)) {
               cards[i].style.display = "flex";
            } else {
               cards[i].style.display = "none";
            }
         }
      }
   </script>
   <script type="module" src="script.js"></script>
</body>
</html>
