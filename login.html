<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go! YNG - Admin Suite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* Professional Improvements */
        .cover-photo {
            height: 120px;
            background: linear-gradient(45deg, #215282, #2d5a27);
            position: relative;
        }
        .three-dot-menu {
            position: absolute;
            top: 15px;
            right: 15px;
            color: white;
            cursor: pointer;
            font-size: 20px;
            z-index: 100;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 25px;
            background: white;
            min-width: 160px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border-radius: 8px;
            z-index: 101;
        }
        .dropdown-content a {
            color: #333;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
            transition: 0.2s;
        }
        .dropdown-content a:hover { background: #f1f1f1; color: var(--danger); }

        #imgPreviewBox {
            width: 100%;
            height: 160px;
            border: 2px dashed #ddd;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: #fafafa;
            overflow: hidden;
        }
        #imgPreviewBox img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <section id="login-section">
        <div class="login-card">
            <div class="logo-area">
                <img src="favicon.png" alt="Go YNG" onerror="this.src='https://cdn-icons-png.flaticon.com/512/8163/8163149.png'">
                <h2>Admin Login</h2>
                <p>Access your dashboard</p>
            </div>
            <div class="input-group">
                <div class="field">
                    <i class="fa fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email Address">
                </div>
                <div class="field">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="pass" placeholder="Password">
                </div>
            </div>
            <button id="loginBtn" class="btn-primary">Sign In <i class="fa fa-arrow-right"></i></button>
            <div class="divider"><span>OR</span></div>
            <div class="social-login">
                <button id="googleBtn" class="btn-social">
                    <img src="https://img.icons8.com/color/24/000000/google-logo.png" alt="Google"> Google
                </button>
            </div>
        </div>
    </section>

    <section id="admin-section" style="display: none;">
        <header class="admin-header">
            <div class="greeting">
                <h3 id="greetingText">Welcome Back!</h3>
                <p id="currentDate"></p>
            </div>
            <div class="header-right">
                <span id="headerUserName" style="font-weight: 600; margin-right: 15px;"></span>
                <button id="logoutBtn" class="btn-danger-icon"><i class="fa fa-power-off"></i></button>
            </div>
        </header>

        <nav class="admin-nav">
            <button onclick="switchTab('tab-profile')" class="nav-item active" id="btn-profile">
                <i class="fa fa-user-circle"></i> Profile
            </button>
            <button onclick="switchTab('tab-price')" class="nav-item" id="btn-price">
                <i class="fa fa-tags"></i> Price Setup
            </button>
            <button onclick="switchTab('tab-stock')" class="nav-item" id="btn-stock">
                <i class="fa fa-warehouse"></i> Live Stock
            </button>
        </nav>

        <main class="content">
            
            <div id="tab-profile" class="tab-pane active">
                <div class="card profile-card" style="padding:0; overflow:hidden;">
                    <div class="cover-photo">
                        <div class="three-dot-menu" id="profileMenuBtn">
                            <i class="fa fa-ellipsis-v"></i>
                            <div class="dropdown-content" id="profileMenu">
                                <a href="#" id="menuLogout"><i class="fa fa-sign-out-alt"></i> Logout</a>
                                <a href="#" onclick="alert('System secure!')"><i class="fa fa-shield-alt"></i> Security</a>
                            </div>
                        </div>
                    </div>
                    <div style="margin-top:-55px; text-align:center; position:relative;">
                        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" id="profilePic" style="width:110px; height:110px; border:5px solid white; border-radius:50%; background:#fff;">
                        <h2 id="dispName" style="margin:10px 0 5px 0;">Admin</h2>
                        <p id="dispRole" style="color: var(--primary); font-weight: 600; font-size: 14px;"></p>
                    </div>
                    <div class="profile-form" style="padding:20px 30px;">
                        <div class="info-row">
                            <label>Display Name</label>
                            <input type="text" id="pNameInput" placeholder="Enter Full Name">
                        </div>
                        <div class="info-row">
                            <label>Bio / Status</label>
                            <input type="text" id="pBio" placeholder="What's your mood?">
                        </div>
                        <div class="info-row">
                            <label>Position</label>
                            <input type="text" id="pRole" placeholder="e.g. Sales Advisor">
                        </div>
                        <button id="updateProfileBtn" class="btn-save">Update Profile <i class="fa fa-check"></i></button>
                    </div>
                </div>
            </div>

            <div id="tab-price" class="tab-pane">
                <div class="card">
                    <h3><i class="fa fa-cog"></i> Model & Price Master</h3>
                    <div class="grid-form">
                        <div class="field-box">
                            <label>Bike Model Name</label>
                            <input type="text" id="mName" placeholder="e.g. Pulsar N160">
                        </div>
                        <div class="field-box">
                            <label>MRP Price (NPR)</label>
                            <input type="number" id="mPrice" placeholder="0">
                        </div>
                        <div class="field-box">
                            <label>Registration Number</label>
                            <input type="text" id="mRegNo" placeholder="e.g. P1-01-001 PA 1234">
                        </div>
                        <div class="field-box">
                            <label>Insurance Cost</label>
                            <input type="number" id="mNormalIns" placeholder="0">
                        </div>
                        <div class="field-box full-width">
                            <label>Image Link (URL)</label>
                            <input type="text" id="mImg" placeholder="Paste link from Google or Cloud...">
                            <div id="imgPreviewBox">
                                <i class="fa fa-image" style="font-size:30px; color:#ccc;"></i>
                            </div>
                        </div>
                    </div>
                    <button id="saveModelBtn" class="btn-save" style="background: var(--primary);">Save to Records</button>
                </div>

                <div class="card table-card" style="margin-top: 20px;">
                    <h3><i class="fa fa-list"></i> Master Price List</h3>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Model</th>
                                    <th>Price</th>
                                    <th>Reg. No</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="masterTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="tab-stock" class="tab-pane">
                <div class="card">
                    <h3><i class="fa fa-plus-circle"></i> Add Bike to Inventory</h3>
                    <div class="grid-form">
                        <div class="field-box">
                            <label>Select Master Model</label>
                            <select id="stockModelSelect"><option>Loading...</option></select>
                        </div>
                        <div class="field-box">
                            <label>Chassis Number</label>
                            <input type="text" id="sChassis" placeholder="Enter Chassis No">
                        </div>
                        <div class="field-box">
                            <label>Engine Number</label>
                            <input type="text" id="sEngine" placeholder="Enter Engine No">
                        </div>
                        <div class="field-box">
                            <label>Colour</label>
                            <input type="text" id="sColor" placeholder="e.g. Ebony Black">
                        </div>
                    </div>
                    <button id="saveStockBtn" class="btn-save" style="background: var(--success);">Add to Stock</button>
                </div>

                <div class="card table-card" style="margin-top: 20px;">
                    <h3><i class="fa fa-database"></i> Live Stock Inventory</h3>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Model</th>
                                    <th>Chassis</th>
                                    <th>Engine</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="stockTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </section>

    <script type="module" src="login.js"></script>
    
    <script>
        // Tab Switching Logic
        function switchTab(id) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const btn = document.querySelector(`button[onclick="switchTab('${id}')"]`);
            if(btn) btn.classList.add('active');
        }

        // Three-dot menu toggle
        document.getElementById('profileMenuBtn').onclick = function(e) {
            e.stopPropagation();
            const menu = document.getElementById('profileMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        };

        window.onclick = function() {
            document.getElementById('profileMenu').style.display = 'none';
        };
    </script>
</body>
    </html>
