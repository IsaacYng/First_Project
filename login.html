<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Go! YNG</title>
    <link rel="stylesheet" href="login.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        .btn-google { background: white; border: 1px solid #ddd; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; transition: 0.3s; margin-top: 20px; }
        .btn-google:hover { background: #f8f9fa; transform: translateY(-2px); }
        img { width: 24px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 style="color: #0054a6; margin-bottom: 10px;">Go! YNG Admin</h2>
        <p style="color: #666; font-size: 14px;">सिस्टम चलाउन कृपया लगइन गर्नुहोस्।</p>
        
        <button class="btn-google" id="loginBtn">
            <img src="https://img.icons8.com/color/48/000000/google-logo.png" alt="Google">
            Login with Google
        </button>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
