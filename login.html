<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Go YNG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div id="login-section">
        <div class="login-card">
            <h2>Admin Login</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button id="loginBtn" class="btn-main">Login</button>
        </div>
    </div>

    <div id="admin-section" style="display: none;">
        <div class="header">
            <h2><i class="fa fa-gauge"></i> Control Panel</h2>
            <button id="logoutBtn" class="btn-danger">Logout</button>
        </div>

        <nav class="admin-nav">
            <button onclick="showTab('tab-price')">Price Setup</button>
            <button onclick="showTab('tab-stock')">Stock Entry</button>
            <button onclick="showTab('tab-profile')">My Profile</button>
        </nav>

        <div class="content">
            <div id="tab-price" class="tab-content card">
                <h3>1. Price & Insurance Setup</h3>
                <div class="grid">
                    <input type="text" id="mName" placeholder="Model Name">
                    <input type="number" id="mPrice" placeholder="Cash Price">
                    <input type="number" id="mNormalIns" placeholder="Normal Insurance">
                    <input type="number" id="mFinanceIns" placeholder="Finance Insurance">
                    <input type="text" id="mImg" placeholder="Image URL">
                </div>
                <button id="saveModelBtn" class="btn-success">Update Price List</button>
            </div>

            <div id="tab-stock" class="tab-content card" style="display:none;">
                <h3>2. Inventory Entry (Chassis/Engine)</h3>
                <div class="grid">
                    <select id="stockModelSelect">
                        <option value="">-- Select Model --</option>
                    </select>
                    <input type="text" id="sChassis" placeholder="Chassis No">
                    <input type="text" id="sEngine" placeholder="Engine No">
                    <input type="text" id="sReg" placeholder="Registration No">
                    <input type="text" id="sColor" placeholder="Color">
                </div>
                <button id="saveStockBtn" class="btn-main">Add to Live Stock</button>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>Model</th><th>Chassis</th><th>Action</th></tr>
                        </thead>
                        <tbody id="stockTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-profile" class="tab-content card" style="display:none;">
                <h3>User Profile</h3>
                <div class="profile-box">
                    <div id="profileDisplay"></div>
                    <hr>
                    <input type="text" id="pBio" placeholder="Your Bio">
                    <input type="text" id="pPost" placeholder="Quick Post/Note">
                    <button id="updateProfileBtn" class="btn-main">Update Profile</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="login.js"></script>
    <script>
        // Tab switching logic
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
        }
    </script>
</body>
                        </html>
