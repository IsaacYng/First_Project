<!DOCTYPE html>
<html>
<head>
    <title>Admin Login | Go! YNG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .login-card { max-width: 350px; margin: 80px auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; font-family: sans-serif; background: white; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-mail { width: 100%; padding: 12px; background: #215282; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .btn-google { width: 100%; padding: 12px; background: white; color: #444; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body style="background: #eef2f3;">
    <div class="login-card">
        <h2>Admin Login</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-mail" id="loginBtn">Login with Email</button>
        
        <div style="margin: 20px 0; color: #888;">OR</div>
        
        <button class="btn-google" id="googleBtn">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" width="20">
            Continue with Google
        </button>
        
        <p style="margin-top: 20px; font-size: 13px; color: #666; cursor: pointer;" id="forgotBtn">Forgot Password?</p>
    </div>
    <script type="module" src="login.js"></script>
</body>
    </html>
