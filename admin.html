<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go! YNG Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #215282; --success: #28a745; --danger: #dc3545; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: none; }
        header { background: var(--primary); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 30px 5%; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: var(--success); color: white; width: 100%; margin-top: 15px; }
        .btn-logout { background: var(--danger); color: white; padding: 8px 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .btn-del { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 1.5rem; font-weight: bold;">Go! YNG Admin</div>
        <div>
            <span id="adminEmail" style="margin-right: 15px; font-size: 0.9rem;"></span>
            <button class="btn btn-logout" onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h2 style="margin-top:0; color: var(--primary);">Add New Bike Model</h2>
            <div class="grid-form">
                <input type="text" id="bikeName" placeholder="Model Name (e.g. Pulsar 150)">
                <input type="number" id="bikePrice" placeholder="MRP Price (NPR)">
                <input type="number" id="bikeIns1" placeholder="Insurance 1 (Standard)">
                <input type="number" id="bikeIns2" placeholder="Insurance 2 (Extra)">
            </div>
            <button class="btn btn-add" onclick="saveBike()">Add to Inventory</button>
        </div>

        <div class="card">
            <h2 style="margin-top:0; color: var(--primary);">Current Inventory</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Model Name</th>
                            <th>MRP Price</th>
                            <th>Insurance 1</th>
                            <th>Insurance 2</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="bikeTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
