<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard | Go! YNG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXQW4khEovrBUtP5JpYFTUch_p5KT-8F8",
            authDomain: "first-project-2082-12-26.firebaseapp.com",
            projectId: "first-project-2082-12-26",
            appId: "1:545170954251:web:0d2f7905834af3b0be8f0e"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html"; // लगइन छैन भने लखेट्ने
            } else {
                document.body.style.display = "block";
                document.getElementById('adminEmail').innerText = user.email;
            }
        });

        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>

    <div id="adminPanel" style="padding: 20px;">
        <nav style="display: flex; justify-content: space-between; align-items: center; background: #215282; color: white; padding: 10px 20px; border-radius: 10px;">
            <h3>Admin Dashboard</h3>
            <div>
                <span id="adminEmail" style="margin-right: 15px; font-size: 14px;"></span>
                <button onclick="logout()" style="background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Logout</button>
            </div>
        </nav>

        <section style="margin-top: 30px;">
            <h2>Manage Bikes</h2>
            <p>यहाँ तपाईंले नयाँ बाइक थप्ने र मूल्य परिवर्तन गर्ने फर्म राख्न सक्नुहुन्छ।</p>
            </section>
    </div>
</body>
</html>
