<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Go! YNG</title>
    <link rel="stylesheet" href="style.css">
    <script type="module">
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";

        // Firebase Config (Your same config)
        const firebaseConfig = {
            apiKey: "AIzaSyAXQW4khEovrBUtP5JpYFTUch_p5KT-8F8",
            authDomain: "first-project-2082-12-26.firebaseapp.com",
            projectId: "first-project-2082-12-26",
            appId: "1:545170954251:web:0d2f7905834af3b0be8f0e"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // सुरक्षा जाँच: लगइन छैन भने लखेट्ने
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                document.getElementById('adminContent').style.display = 'block';
                document.getElementById('userEmail').innerText = user.email;
            }
        });

        // लगआउट फङ्सन
        window.logout = () => {
            signOut(auth).then(() => window.location.href = "login.html");
        };
    </script>
</head>
<body style="background: #f4f7f6;">
    <div id="adminContent" style="display:none;">
        <nav style="background: #215282; padding: 15px; color: white; display: flex; justify-content: space-between;">
            <h3>Go! YNG Admin</h3>
            <div>
                <span id="userEmail"></span>
                <button onclick="logout()" style="margin-left:15px; background:red; color:white; border:none; padding:5px 10px; cursor:pointer;">Logout</button>
            </div>
        </nav>

        <main style="padding: 20px;">
            <h2>Dashboard</h2>
            <p>Welcome to your bike management panel.</p>
            </main>
    </div>
</body>
                </html>
