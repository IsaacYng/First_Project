<main style="padding: 20px; max-width: 1000px; margin: auto;">
    <div style="background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <h2 style="color: #215282; margin-top: 0;">Add New Bike</h2>
        <div id="bikeForm" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
            <input type="text" id="bikeName" placeholder="Bike Name (e.g. Pulsar 150)" style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            <input type="number" id="bikePrice" placeholder="MRP Price" style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            <input type="number" id="bikeIns" placeholder="Insurance Amount" style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            <button onclick="saveBike()" style="background: #28a745; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold;">
                <i class="fa fa-plus"></i> Add Bike
            </button>
        </div>
    </div>

    <div style="margin-top: 40px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <h2 style="color: #215282;">Current Inventory</h2>
        <div style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
                <thead>
                    <tr style="background: #f8fafc; text-align: left; border-bottom: 2px solid #eee;">
                        <th style="padding: 12px;">Model Name</th>
                        <th style="padding: 12px;">Price (MRP)</th>
                        <th style="padding: 12px;">Insurance</th>
                        <th style="padding: 12px;">Action</th>
                    </tr>
                </thead>
                <tbody id="bikeTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</main>

<script type="module" src="admin.js"></script>
