<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go! YNG | Price List & Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass-nav { backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.8); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="glass-nav border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <span class="text-2xl font-black text-red-600 tracking-tighter">Go! YNG</span>
                    <span class="hidden sm:inline-block bg-red-100 text-red-600 text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-wider">Office Pro</span>
                </div>

                <div class="hidden md:flex items-center space-x-8 font-semibold text-gray-600">
                    <a href="#" class="hover:text-red-600 transition">Home</a>
                    <a href="form.html" class="hover:text-red-600 transition">Form</a>
                    <a href="finance.html" class="hover:text-red-600 transition font-bold text-indigo-600 flex items-center gap-1">
                       <i class="fa-solid fa-gamepad"></i> Masti Quiz
                    </a>
                </div>

                <div class="flex items-center gap-4">
                    <button id="menu-btn" class="md:hidden text-2xl p-2 text-slate-700">
                        <i class="fa-solid fa-bars-staggered"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10">
        
        <section id="game-section" class="max-w-2xl mx-auto">
            <div class="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100 relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-50 rounded-full blur-3xl"></div>
                
                <div class="relative z-10 text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 text-white rounded-2xl shadow-lg shadow-indigo-200 mb-4 transform -rotate-6">
                        <i class="fa-solid fa-trophy text-2xl"></i>
                    </div>
                    <h2 class="text-3xl font-black text-slate-800 italic">Masti Quiz 🎯</h2>
                    <p class="text-slate-500 mt-2">Test your product knowledge & win rewards!</p>
                </div>

                <div id="quiz-entry" class="text-center">
                    <button id="playBtn" class="group relative bg-slate-900 text-white px-10 py-5 rounded-2xl font-black text-lg shadow-2xl hover:bg-indigo-600 transition-all duration-300 transform active:scale-95">
                        <span class="flex items-center gap-3">
                            START CHALLENGE <i class="fa-solid fa-bolt text-yellow-400 group-hover:animate-bounce"></i>
                        </span>
                    </button>
                    <p class="text-xs text-slate-400 mt-4 uppercase tracking-widest font-bold">5 Questions • Real Prices • Fast Play</p>
                </div>

                <div id="quiz-container" class="mt-4">
                    </div>
            </div>
        </section>

    </main>

    <footer class="bg-white border-t py-12 mt-20">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-400 font-medium mb-6 tracking-wide">Go your Dream &copy; 2026 • Phidim, Nepal</p>
            <div class="flex justify-center space-x-10 text-2xl text-slate-300">
                <a href="#" class="hover:text-blue-600 transition-all transform hover:-translate-y-1"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" class="hover:text-green-500 transition-all transform hover:-translate-y-1"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="#" class="hover:text-pink-600 transition-all transform hover:-translate-y-1"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script type="module">
        import { startOfficeGame } from './game.js';
        
        const playBtn = document.getElementById('playBtn');
        const entryDiv = document.getElementById('quiz-entry');

        playBtn.addEventListener('click', () => {
            // Hide entry button and start game
            entryDiv.classList.add('hidden');
            startOfficeGame(5);
        });
    </script>
</body>
</html>
